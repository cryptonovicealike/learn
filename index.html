    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C12;
            color: #E8EDF5;
            line-height: 1.5;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1E2A;
        }
        ::-webkit-scrollbar-thumb {
            background: #00D8FF;
            border-radius: 4px;
        }

        html {
            scroll-behavior: smooth;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 216, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 216, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: slowDrift 60s linear infinite;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0, 216, 255, 0.2);
            border-radius: 50%;
            animation: floatParticle 20s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 216, 255, 0.2);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Fixed logo SVG - complete and valid */
        .logo-icon {
            width: 36px;
            height: 36px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D8FF, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-weight: 400;
            color: #E8EDF5;
            background: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            color: #A0A8C0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #00D8FF;
        }

        .google-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 216, 255, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .google-btn:hover {
            background: rgba(0, 216, 255, 0.1);
            border-color: #00D8FF;
            transform: scale(1.02);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00D8FF, #8B5CF6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        .mobile-menu-btn {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00D8FF, #8B5CF6);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: #0A0C12;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 216, 255, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #00D8FF;
            padding: 12px 28px;
            border-radius: 40px;
            color: #00D8FF;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: rgba(0, 216, 255, 0.1);
            transform: scale(1.02);
        }

            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #A0A8C0;
            max-width: 600px;
            margin: 0 auto 32px;
        }

        .hero-buttons {

            gap: 16px;
            justify-content: center;

        }

        .disclaimer {

            color: #5A6275;
        }
        .disclaimer a {
            color: #00D8FF;
            text-decoration: none;
        }

        .stats {

            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

        .mission-card {

            padding: 40px;

            border: 1px solid rgba(0, 216, 255, 0.4);

        .mission-card h3 {

            cursor: pointer;

            width: 100%;

        .article-card:hover {

            box-shadow: 0 20px 35px -10px rgba(0, 216, 255, 0.2);

            background: rgba(0, 216, 255, 0.2);

        .article-excerpt {

            border-top: 1px solid rgba(255, 255, 255, 0.05);

            color: #5A6275;
        }

        .read-more {
            color: #00D8FF;

        .newsletter {

            padding: 48px;

            border: 1px solid rgba(0, 216, 255, 0.2);

        .newsletter-form {

            padding: 12px 20px;

            width: 280px;
            font-size: 14px;
        }

        .newsletter-form input:focus {
            outline: none;
            border-color: #00D8FF;
        }

        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 48px 0 24px;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-col h4 {
            margin-bottom: 16px;
            font-size: 16px;
        }

        .footer-col a, .footer-col .contact-email {
            display: block;
            color: #A0A8C0;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 10px;
            transition: color 0.3s;
        }
        .footer-col a:hover {
            color: #00D8FF;
        }
        .contact-email {
            word-break: break-all;
        }
        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: #5A6275;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0F111A;
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(0, 216, 255, 0.3);
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }

        .article-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1001;
            overflow-y: auto;
        }

        .article-modal-content {
            max-width: 800px;
            margin: 60px auto;
            background: #0F111A;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(0, 216, 255, 0.3);
        }

        .close-article {
            float: right;
            cursor: pointer;
            font-size: 28px;
            color: #A0A8C0;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .mobile-menu-btn {
                display: block;
            }
            .hero h1 {
                font-size: 36px;
            }
            .container {
                padding: 0 16px;
            }
            .stats {
                gap: 24px;
            }
            .newsletter {
                padding: 32px 20px;
            }
            .mission-card {
                padding: 28px;
            }
            .logo-icon {
                width: 28px;
                height: 28px;
            }
            .logo {
                font-size: 20px;
            }
        }
    </style>
</head>
